# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration
# Scrapes metrics from: Node.js app, Node Exporter, cAdvisor
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s       # Pull metrics every 15 seconds
  evaluation_interval: 15s   # Evaluate rules every 15 seconds

scrape_configs:

  # ── Prometheus itself ──────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Your Node.js app (/metrics endpoint) ──────────────────────────────────
  - job_name: "ai-tools-api"
    static_configs:
      - targets: ["ai-tools-api:3000"]
    metrics_path: /metrics

  # ── EC2 system metrics (CPU, RAM, Disk, Network) ───────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Docker container metrics ───────────────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
